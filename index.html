<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>2-3 야자 관리 프로그램</title>
<style>
  :root{--bg:#f6f8fb;--card:#fff;--border:#e5e7eb;--text:#0f172a;--sub:#6b7280;--blue:#3b82f6;--red:#ef4444;--shadow:0 8px 24px rgba(15,23,42,.08);--r:14px}
  *{box-sizing:border-box}
  html,body{min-height:100%}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.4 system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Malgun Gothic,Helvetica,Arial,sans-serif;overflow:auto;word-break:keep-all}
  .page{max-width:1580px;margin:18px auto;padding:0 14px 18px}
  header{background:#0b2545;color:#e6f0ff;border-radius:16px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:10px;box-shadow:var(--shadow);margin-bottom:14px}
  header h1{margin:0;font-size:16px;font-weight:800}
  .meta{font-size:12px;opacity:.9;white-space:nowrap}
  .layout{display:grid;grid-template-columns:340px minmax(0,1fr);gap:14px;align-items:start}
  .side{display:flex;flex-direction:column;gap:10px;position:sticky;top:18px}
  .panel{background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:12px}
  .panel h2{margin:0 0 10px;font-size:14px;color:#334155}
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .btn{background:#fff;border:1px solid var(--border);border-radius:10px;padding:8px 10px;font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(15,23,42,.06)}
  .btn.small{border-radius:8px;padding:6px 9px}
  .btn:active{transform:translateY(1px)}
  .cal-title{font-weight:800}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;font-size:12px;user-select:none}
  .cal-dow{text-align:center;color:#64748b;font-weight:700}
  .cal-day{text-align:center;padding:8px 0;border:1px solid var(--border);border-radius:10px;cursor:pointer;background:#fff}
  .cal-day.other{opacity:.45}
  .cal-day.today{outline:2px solid #3b82f6}
  .cal-day.selected{background:#eff6ff;border-color:#bfdbfe;font-weight:800}
  .timeline{max-height:320px;overflow:auto}
  .tl-empty{color:#64748b;font-size:12px}
  .tl-item{display:flex;justify-content:space-between;padding:6px 8px;border:1px solid var(--border);border-radius:10px;margin-bottom:6px}
  .tl-name{font-weight:800}
  .tl-reason{font-size:12px;color:#64748b}
  .controls{display:flex;gap:8px;margin:0 2px 10px;flex-wrap:wrap;align-items:center}
  .hint{margin-left:auto;color:#6b7280;font-size:12px}
  .search{height:38px;min-width:220px;padding:0 12px;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--text);outline:none;box-shadow:0 2px 6px rgba(15,23,42,.06)}
  .search:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
  .grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:12px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:grid;grid-template-columns:auto 1fr auto;grid-template-rows:auto auto;gap:8px 12px;align-items:center;box-shadow:0 2px 8px rgba(15,23,42,.06);min-height:82px}
  .no{grid-row:1 / span 2;font-weight:800;color:#334155;width:36px;text-align:right;padding-right:6px}
  .name{font-weight:800}
  .id{font-size:12px;color:var(--sub)}
  .status{justify-self:end;align-self:start;display:inline-flex;align-items:center;gap:8px;background:#f8fafc;border:1px solid var(--border);padding:6px 12px;border-radius:999px;cursor:pointer;font-weight:800;font-size:12px;height:30px}
  .pill{width:10px;height:10px;border-radius:999px}
  .present{color:#3b82f6}.present .pill{background:#3b82f6}
  .absent{color:#ef4444}.absent .pill{background:#ef4444}
  .reason-wrap{grid-column:2 / -1;display:flex;align-items:center;gap:8px}
  .reason-label{font-size:11px;color:#64748b;white-space:nowrap}
  .reason{font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:8px;background:#fff;visibility:hidden;max-width:100%}
  .card.absent .reason{visibility:visible}
  .empty-grid{grid-column:1 / -1;background:#fff;border:1px dashed var(--border);border-radius:16px;padding:28px 18px;text-align:center;color:#64748b;box-shadow:0 2px 8px rgba(15,23,42,.04)}
  @media (max-width:1300px){
    .grid{grid-template-columns:repeat(4,minmax(0,1fr))}
  }
  @media (max-width:1100px){
    .layout{grid-template-columns:1fr}
    .side{position:static}
    .grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    .timeline{max-height:none}
  }
  @media (max-width:760px){
    .page{padding:0 10px 14px}
    header{flex-direction:column;align-items:flex-start}
    .meta{white-space:normal}
    .controls{flex-direction:column;align-items:stretch}
    .hint{margin-left:0}
    .search{min-width:0;width:100%}
    .grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
  <div class="page">
    <header>
      <h1>2-3 야자 관리 프로그램</h1>
      <div class="meta">날짜·시간: <span id="dt"></span> · 보기 날짜: <span id="viewDate"></span></div>
    </header>

    <div class="layout">
      <div class="side">
        <section class="panel">
          <h2>달력</h2>
          <div class="cal-header">
            <button class="btn small" id="prevMonth">←</button>
            <div class="cal-title" id="calTitle"></div>
            <button class="btn small" id="nextMonth">→</button>
          </div>
          <div class="cal-grid" id="calGrid"></div>
        </section>
        <section class="panel">
          <h2>타임라인 (선택 날짜의 불참자)</h2>
          <div id="timeline" class="timeline"></div>
        </section>
      </div>

      <div>
        <div class="controls">
          <button class="btn" id="allPresent">모두 참여</button>
          <button class="btn" id="allAbsent">모두 불참</button>
          <button class="btn" id="goToday">오늘</button>
          <button class="btn" id="downloadExcel">엑셀 다운로드</button>
          <input class="search" id="searchInput" type="text" placeholder="번호, 학번, 이름 검색" />
          <button class="btn" id="clearSearch">검색 초기화</button>
          <div class="hint">요일 자동 불참은 ‘학원’, 수동 불참은 기본 ‘기타’로 저장됨</div>
        </div>
        <section id="grid" class="grid"></section>
      </div>
    </div>
  </div>

<script>
  var REASONS=['동아리','학원','병원','방과후','기타']
  var WEEKDAYS=['일','월','화','수','목','금','토']
  var KEY='selfstudy-2-03_v3'

  var RULES={
    1:['화'],2:['화'],3:['목'],4:['화'],5:['월'],6:['수'],7:['화'],8:['화'],9:['수'],
    11:['수'],12:['수'],13:['화'],14:['수'],15:['월'],16:['수'],17:['수'],18:['화'],
    19:['수'],20:['월'],21:['수'],22:['화'],23:['목'],24:['화'],25:['수'],26:['화'],
    27:['화'],28:['수'],29:['목'],32:['화'],33:['목'],35:['수'],36:['수']
  }

  var studentData=[
    {no:1,id:'20301',name:'고정현'},{no:2,id:'20302',name:'권오현'},{no:3,id:'20303',name:'김가빈'},
    {no:4,id:'20304',name:'김건우'},{no:5,id:'20305',name:'김민성'},{no:6,id:'20306',name:'김민재'},
    {no:7,id:'20307',name:'김선준'},{no:8,id:'20308',name:'김준우'},{no:9,id:'20309',name:'김채원'},
    {no:10,id:'20310',name:'김태민'},{no:11,id:'20311',name:'김현서'},{no:12,id:'20312',name:'김형준'},
    {no:13,id:'20313',name:'문서준'},{no:14,id:'20314',name:'박민준'},{no:15,id:'20315',name:'박준이'},
    {no:16,id:'20316',name:'박지환'},{no:17,id:'20317',name:'방준서'},{no:18,id:'20318',name:'서도훈'},
    {no:19,id:'20319',name:'석진오'},{no:20,id:'20320',name:'손우린'},{no:21,id:'20321',name:'오태윤'},
    {no:22,id:'20322',name:'우승엽'},{no:23,id:'20323',name:'유어진'},{no:24,id:'20324',name:'이민혁'},
    {no:25,id:'20325',name:'이성민'},{no:26,id:'20326',name:'이승준'},{no:27,id:'20327',name:'이승훈'},
    {no:28,id:'20328',name:'이재성'},{no:29,id:'20329',name:'이채환'},{no:30,id:'20330',name:'장래겸'},
    {no:31,id:'20331',name:'장우진'},{no:32,id:'20332',name:'전재신'},{no:33,id:'20333',name:'정현우'},
    {no:34,id:'20334',name:'조성윤'},{no:35,id:'20335',name:'조승찬'},{no:36,id:'20336',name:'최승호'}
  ]

  var roster=[]
  for(var i=0;i<studentData.length;i++){
    roster.push({no:studentData[i].no,id:studentData[i].id,name:studentData[i].name,status:'present',reason:'기타',manual:false})
  }

  var dtEl=document.getElementById('dt')
  var viewDateEl=document.getElementById('viewDate')
  var calTitle=document.getElementById('calTitle')
  var calGrid=document.getElementById('calGrid')
  var gridEl=document.getElementById('grid')
  var timelineEl=document.getElementById('timeline')
  var searchInput=document.getElementById('searchInput')
  var viewDate=new Date()
  var dated={}

  function tick(){
    var d=new Date()
    dtEl.textContent=d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})+' · '+d.toLocaleTimeString('ko-KR',{hour12:false})
  }

  function pad(n){
    return n<10?'0'+n:String(n)
  }

  function keyOf(d){
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())
  }

  function fmt(d){
    return d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})
  }

  function fileDate(d){
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())
  }

  function arrayHas(arr,value){
    if(!arr) return false
    return arr.indexOf(value)!==-1
  }

  function reasonValid(reason){
    return arrayHas(REASONS,reason)
  }

  function getSavedItem(saved,no){
    if(!saved || !saved.length) return null
    for(var i=0;i<saved.length;i++){
      if(saved[i] && saved[i].no===no) return saved[i]
    }
    return null
  }

  function baseline(d){
    var dowName=WEEKDAYS[d.getDay()]
    var result=[]
    for(var i=0;i<studentData.length;i++){
      var p=studentData[i]
      if(RULES[p.no] && arrayHas(RULES[p.no],dowName)){
        result.push({no:p.no,status:'absent',reason:'학원',manual:false})
      }else{
        result.push({no:p.no,status:'present',reason:'기타',manual:false})
      }
    }
    return result
  }

  function loadStorage(){
    try{
      var raw=localStorage.getItem(KEY)
      dated=raw?JSON.parse(raw):{}
    }catch(e){
      dated={}
    }
  }

  function saveStorage(){
    try{
      localStorage.setItem(KEY,JSON.stringify(dated))
    }catch(e){}
  }

  function loadFor(d){
    var key=keyOf(d)
    var saved=dated[key]
    var base=baseline(d)
    var merged=[]

    for(var i=0;i<base.length;i++){
      var b=base[i]
      var s=Array.isArray(saved)?getSavedItem(saved,b.no):null
      if(s){
        var manual=s.manual===true || s.status!==b.status || s.reason!==b.reason
        if(manual){
          merged.push({no:b.no,status:s.status,reason:s.reason,manual:true})
        }else{
          merged.push(b)
        }
      }else{
        merged.push(b)
      }
    }

    for(var j=0;j<roster.length;j++){
      var p=roster[j]
      var m=getSavedItem(merged,p.no)
      p.status=m.status
      p.reason=reasonValid(m.reason)?m.reason:'기타'
      p.manual=!!m.manual
    }

    if(!Array.isArray(saved)){
      dated[key]=merged
      saveStorage()
    }
  }

  function saveFor(d){
    var key=keyOf(d)
    var arr=[]
    for(var i=0;i<roster.length;i++){
      arr.push({no:roster[i].no,status:roster[i].status,reason:roster[i].reason,manual:roster[i].manual===true})
    }
    dated[key]=arr
    saveStorage()
  }

  function getFilteredRoster(){
    var q=searchInput.value.replace(/^\s+|\s+$/g,'').toLowerCase()
    if(!q) return roster.slice()
    var filtered=[]
    for(var i=0;i<roster.length;i++){
      var p=roster[i]
      if(String(p.no).indexOf(q)!==-1 || String(p.id).toLowerCase().indexOf(q)!==-1 || String(p.name).toLowerCase().indexOf(q)!==-1){
        filtered.push(p)
      }
    }
    return filtered
  }

  function setView(d){
    viewDate=new Date(d.getFullYear(),d.getMonth(),d.getDate())
    viewDateEl.textContent=fmt(viewDate)
    loadFor(viewDate)
    renderCalendar()
    renderList()
    renderTimeline()
  }

  function dayCell(d,other){
    var div=document.createElement('div')
    div.className='cal-day'+(other?' other':'')
    div.textContent=d.getDate()
    var today=new Date()
    if(d.toDateString()===today.toDateString()) div.className+=' today'
    if(d.toDateString()===viewDate.toDateString()) div.className+=' selected'
    div.addEventListener('click',function(){
      setView(d)
    })
    return div
  }

  function renderCalendar(){
    var WEEK_HEADER=['일','월','화','수','목','금','토']
    calGrid.innerHTML=''
    var y=viewDate.getFullYear()
    var m=viewDate.getMonth()
    calTitle.textContent=y+'년 '+(m+1)+'월'

    for(var i=0;i<WEEK_HEADER.length;i++){
      var h=document.createElement('div')
      h.className='cal-dow'
      h.textContent=WEEK_HEADER[i]
      calGrid.appendChild(h)
    }

    var first=new Date(y,m,1)
    var start=first.getDay()
    var days=new Date(y,m+1,0).getDate()
    var prevMonthDays=new Date(y,m,0).getDate()

    for(var a=start-1;a>=0;a--){
      calGrid.appendChild(dayCell(new Date(y,m-1,prevMonthDays-a),true))
    }
    for(var day=1;day<=days;day++){
      calGrid.appendChild(dayCell(new Date(y,m,day),false))
    }

    var total=7+start+days
    var fill=49-total
    for(var b=1;b<=fill;b++){
      calGrid.appendChild(dayCell(new Date(y,m+1,b),true))
    }
  }

  function renderList(){
    gridEl.innerHTML=''
    var filtered=getFilteredRoster()

    if(!filtered.length){
      var empty=document.createElement('div')
      empty.className='empty-grid'
      empty.textContent='검색 결과가 없습니다.'
      gridEl.appendChild(empty)
      return
    }

    for(var i=0;i<filtered.length;i++){
      (function(p){
        var card=document.createElement('div')
        var btn=document.createElement('button')
        var sel=document.createElement('select')
        var rw=document.createElement('div')

        function syncCard(){
          card.className='card '+p.status
          btn.className='status '+p.status
          btn.innerHTML='<span class="pill"></span><span class="label">'+(p.status==='present'?'참여':'불참')+'</span>'
        }

        card.innerHTML='<div class="no">'+p.no+'.</div><div class="name">'+p.name+'</div><div class="id">'+p.id+'</div>'

        btn.addEventListener('click',function(){
          p.status=p.status==='present'?'absent':'present'
          if(p.status!=='absent') p.reason='기타'
          p.manual=true
          saveFor(viewDate)
          syncCard()
          renderTimeline()
        })

        sel.className='reason'
        for(var r=0;r<REASONS.length;r++){
          var o=document.createElement('option')
          o.value=REASONS[r]
          o.textContent=REASONS[r]
          if(p.reason===REASONS[r]) o.selected=true
          sel.appendChild(o)
        }
        sel.addEventListener('change',function(){
          p.reason=sel.value
          p.manual=true
          saveFor(viewDate)
          renderTimeline()
        })

        rw.className='reason-wrap'
        rw.innerHTML='<span class="reason-label">불참 사유</span>'
        rw.appendChild(sel)

        card.appendChild(btn)
        card.appendChild(rw)
        syncCard()
        gridEl.appendChild(card)
      })(filtered[i])
    }
  }

  function renderTimeline(){
    timelineEl.innerHTML=''
    var filtered=getFilteredRoster()
    var allowed={}
    var abs=[]

    for(var i=0;i<filtered.length;i++){
      allowed[filtered[i].no]=true
    }
    for(var j=0;j<roster.length;j++){
      if(roster[j].status==='absent' && allowed[roster[j].no]){
        abs.push({no:roster[j].no,name:roster[j].name,reason:roster[j].reason})
      }
    }
    abs.sort(function(a,b){return a.no-b.no})

    if(!abs.length){
      var e=document.createElement('div')
      e.className='tl-empty'
      e.textContent='이 날짜의 불참자가 없습니다.'
      timelineEl.appendChild(e)
      return
    }

    for(var k=0;k<abs.length;k++){
      var item=document.createElement('div')
      item.className='tl-item'
      item.innerHTML='<div class="tl-name">'+abs[k].no+'. '+abs[k].name+'</div><div class="tl-reason">'+abs[k].reason+'</div>'
      timelineEl.appendChild(item)
    }
  }

  function csvCell(v){
    var s=String(v==null?'':v)
    return '"'+s.replace(/"/g,'""')+'"'
  }

  function downloadExcelFile(){
    var rows=[
      ['날짜',fmt(viewDate)],
      [],
      ['번호','학번','이름','상태','불참 사유','수동 변경']
    ]
    var filtered=getFilteredRoster()
    for(var i=0;i<filtered.length;i++){
      rows.push([
        filtered[i].no,
        filtered[i].id,
        filtered[i].name,
        filtered[i].status==='present'?'참여':'불참',
        filtered[i].status==='absent'?filtered[i].reason:'',
        filtered[i].manual?'예':'아니오'
      ])
    }
    var lines=[]
    for(var j=0;j<rows.length;j++){
      var cols=[]
      for(var k=0;k<rows[j].length;k++){
        cols.push(csvCell(rows[j][k]))
      }
      lines.push(cols.join(','))
    }
    var csv='\uFEFF'+lines.join('\r\n')
    var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'})
    var url=URL.createObjectURL(blob)
    var a=document.createElement('a')
    a.href=url
    a.download='2-3_야자명단_'+fileDate(viewDate)+'.csv'
    document.body.appendChild(a)
    a.click()
    a.parentNode.removeChild(a)
    URL.revokeObjectURL(url)
  }

  document.getElementById('allPresent').addEventListener('click',function(){
    for(var i=0;i<roster.length;i++){
      roster[i].status='present'
      roster[i].reason='기타'
      roster[i].manual=true
    }
    saveFor(viewDate)
    renderList()
    renderTimeline()
  })

  document.getElementById('allAbsent').addEventListener('click',function(){
    for(var i=0;i<roster.length;i++){
      roster[i].status='absent'
      if(roster[i].reason!=='학원') roster[i].reason='기타'
      roster[i].manual=true
    }
    saveFor(viewDate)
    renderList()
    renderTimeline()
  })

  document.getElementById('goToday').addEventListener('click',function(){
    setView(new Date())
  })

  document.getElementById('downloadExcel').addEventListener('click',downloadExcelFile)

  searchInput.addEventListener('input',function(){
    renderList()
    renderTimeline()
  })

  document.getElementById('clearSearch').addEventListener('click',function(){
    searchInput.value=''
    renderList()
    renderTimeline()
    searchInput.focus()
  })

  document.getElementById('prevMonth').addEventListener('click',function(){
    setView(new Date(viewDate.getFullYear(),viewDate.getMonth()-1,1))
  })

  document.getElementById('nextMonth').addEventListener('click',function(){
    setView(new Date(viewDate.getFullYear(),viewDate.getMonth()+1,1))
  })

  ;(function(){
    var last=new Date().toDateString()
    setInterval(function(){
      var now=new Date()
      var s=now.toDateString()
      if(s!==last){
        last=s
        setView(now)
      }
    },60000)
  })()

  document.addEventListener('visibilitychange',function(){
    if(!document.hidden){
      setView(new Date())
    }
  })

  tick()
  setInterval(tick,1000)
  loadStorage()
  setView(new Date())
</script>
</body>
</html>
