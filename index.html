<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>2-3 야자 관리 프로그램</title>
<style>
  :root{
    --bg:#f6f8fb;--card:#fff;--border:#e5e7eb;--text:#0f172a;--sub:#6b7280;
    --blue:#3b82f6;--red:#ef4444;--shadow:0 8px 24px rgba(15,23,42,.08);--r:12px
  }
  *{box-sizing:border-box}
  html,body{width:100%;height:100%;margin:0}
  body{
    background:var(--bg);color:var(--text);
    font:13px/1.35 system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Malgun Gothic,Helvetica,Arial,sans-serif;
    overflow:hidden;word-break:keep-all
  }
  .viewport{
    width:100vw;height:100vh;padding:12px;overflow:hidden
  }
  .fit-shell{
    width:100%;height:100%;position:relative;overflow:hidden
  }
  .fit-stage{
    transform-origin:top left;
    width:1540px;
  }
  .page{
    width:1540px;
    display:flex;flex-direction:column;gap:10px
  }
  header{
    background:#0b2545;color:#e6f0ff;border-radius:14px;padding:12px 16px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;box-shadow:var(--shadow)
  }
  header h1{margin:0;font-size:15px;font-weight:800}
  .meta{font-size:11px;opacity:.95;white-space:nowrap}
  .layout{
    display:grid;grid-template-columns:360px minmax(0,1fr);gap:12px;align-items:start
  }
  .side{display:flex;flex-direction:column;gap:10px}
  .panel{
    background:#fff;border:1px solid var(--border);border-radius:14px;
    box-shadow:var(--shadow);padding:10px
  }
  .panel h2{margin:0 0 8px;font-size:13px;color:#334155}
  .clock-panel{
    padding:18px 16px;min-height:250px;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    background:linear-gradient(180deg,#0b2545 0%, #12376a 100%);
    color:#e6f0ff;border:none
  }
  .clock-label{
    font-size:13px;font-weight:800;letter-spacing:.08em;opacity:.9;margin-bottom:10px
  }
  .clock-date{
    font-size:18px;font-weight:700;opacity:.95;margin-bottom:10px;text-align:center
  }
  .clock-time{
    font-size:72px;line-height:1;font-weight:900;letter-spacing:.04em;
    font-variant-numeric:tabular-nums;text-shadow:0 10px 24px rgba(0,0,0,.22)
  }
  .clock-seconds{
    font-size:30px;font-weight:800;opacity:.92;margin-top:8px
  }
  .timeline{max-height:300px;overflow:auto}
  .tl-empty{color:#64748b;font-size:11px}
  .tl-item{
    display:flex;justify-content:space-between;gap:8px;padding:6px 8px;border:1px solid var(--border);
    border-radius:9px;margin-bottom:6px
  }
  .tl-name{font-weight:800;font-size:12px}
  .tl-reason{font-size:11px;color:#64748b}
  .summary{
    margin-top:10px;padding-top:10px;border-top:1px solid var(--border);
    font-size:12px;font-weight:800;color:#334155
  }
  .btn{
    background:#fff;border:1px solid var(--border);border-radius:9px;padding:6px 9px;
    font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(15,23,42,.06);font-size:12px
  }
  .btn:active{transform:translateY(1px)}
  .controls{
    display:flex;gap:7px;margin:0 2px 8px;flex-wrap:wrap;align-items:center
  }
  .hint{margin-left:auto;color:#6b7280;font-size:11px}
  .search{
    height:32px;min-width:180px;padding:0 10px;border:1px solid var(--border);border-radius:9px;
    background:#fff;color:var(--text);outline:none;box-shadow:0 2px 6px rgba(15,23,42,.06);font-size:12px
  }
  .search:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
  .grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}
  .card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:9px 10px;
    display:grid;grid-template-columns:28px 1fr auto;grid-template-rows:auto auto;gap:6px 8px;
    align-items:center;box-shadow:0 2px 8px rgba(15,23,42,.06);min-height:70px
  }
  .no{grid-row:1 / span 2;font-weight:800;color:#334155;width:28px;text-align:right;padding-right:4px;font-size:12px}
  .name{font-weight:800;font-size:13px}
  .id{font-size:11px;color:var(--sub)}
  .status{
    justify-self:end;align-self:start;display:inline-flex;align-items:center;gap:6px;background:#f8fafc;
    border:1px solid var(--border);padding:4px 9px;border-radius:999px;cursor:pointer;font-weight:800;
    font-size:11px;height:26px
  }
  .pill{width:8px;height:8px;border-radius:999px}
  .present{color:#3b82f6}.present .pill{background:#3b82f6}
  .absent{color:#ef4444}.absent .pill{background:#ef4444}
  .reason-wrap{grid-column:2 / -1;display:flex;align-items:center;gap:7px;min-width:0}
  .reason-label{font-size:10px;color:#64748b;white-space:nowrap}
  .reason{
    font-size:11px;padding:3px 7px;border:1px solid var(--border);border-radius:7px;
    background:#fff;visibility:hidden;max-width:100%;min-width:0
  }
  .card.absent .reason{visibility:visible}
  .empty-grid{
    grid-column:1 / -1;background:#fff;border:1px dashed var(--border);border-radius:16px;
    padding:22px 16px;text-align:center;color:#64748b;box-shadow:0 2px 8px rgba(15,23,42,.04)
  }
</style>
</head>
<body>
  <div class="viewport">
    <div class="fit-shell" id="fitShell">
      <div class="fit-stage" id="fitStage">
        <div class="page" id="page">
          <header>
            <h1>2-3 야자 관리 프로그램</h1>
            <div class="meta">현재 날짜: <span id="viewDate"></span> · 마지막 갱신: <span id="dt"></span></div>
          </header>

          <div class="layout">
            <div class="side">
              <section class="panel clock-panel">
                <div class="clock-label">현재 시각</div>
                <div class="clock-date" id="clockDate"></div>
                <div class="clock-time" id="clockTime">00:00</div>
                <div class="clock-seconds" id="clockSeconds">00</div>
              </section>

              <section class="panel">
                <h2>불참자 명단</h2>
                <div id="timeline" class="timeline"></div>
                <div id="summary" class="summary"></div>
              </section>
            </div>

            <div>
              <div class="controls">
                <button class="btn" id="allPresent">모두 참여</button>
                <button class="btn" id="allAbsent">모두 불참</button>
                <button class="btn" id="goToday">오늘</button>
                <button class="btn" id="downloadExcel">엑셀 다운로드</button>
                <input class="search" id="searchInput" type="text" placeholder="번호, 학번, 이름 검색" />
                <button class="btn" id="clearSearch">검색 초기화</button>
                <div class="hint">기본 참여요일이 아닌 날은 자동으로 ‘학원’ 불참 처리됩니다.</div>
              </div>
              <section id="grid" class="grid"></section>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  var REASONS=['동아리','학원','병원','방과후','기타']
  var WEEKDAYS=['일','월','화','수','목','금','토']
  var KEY='selfstudy-2-03_v5'

  var PARTICIPATION_RULES={
    1:['월','화','목'],2:['월','수','목'],3:['월','화','목'],4:[],
    5:['월','수','목'],6:['월','화','수'],7:['월','화','수','목'],8:['월','화','목'],
    9:['월','수','목'],10:['화','수','목'],11:['월','수','목'],12:['월','수','목'],
    13:['월','화','목'],14:['월','화','수'],15:['월','화','수'],16:['월','수','목'],
    17:['월','화','수','목'],18:['월','화','목'],19:['월','수','목'],20:['월','화','목'],
    21:['월','화','목'],22:['월','화','수','목'],23:['월','화','목'],24:['월','수','목'],
    25:['월','수','목'],26:['월','화','목'],27:['월','화','수','목'],28:['월','화','목'],
    29:[],30:['월','화','목'],31:['월','화','수','목'],32:['월','화','목'],
    33:['월','화','목'],34:['화','수','목'],35:['월','수','목'],36:['월','화','수','목']
  }

  var studentData=[
    {no:1,id:'20301',name:'고정현'},{no:2,id:'20302',name:'권오현'},{no:3,id:'20303',name:'김가빈'},
    {no:4,id:'20304',name:'김건우'},{no:5,id:'20305',name:'김민성'},{no:6,id:'20306',name:'김민재'},
    {no:7,id:'20307',name:'김선준'},{no:8,id:'20308',name:'김준우'},{no:9,id:'20309',name:'김채원'},
    {no:10,id:'20310',name:'김태민'},{no:11,id:'20311',name:'김현서'},{no:12,id:'20312',name:'김형준'},
    {no:13,id:'20313',name:'문서준'},{no:14,id:'20314',name:'박민준'},{no:15,id:'20315',name:'박준이'},
    {no:16,id:'20316',name:'박지환'},{no:17,id:'20317',name:'방준서'},{no:18,id:'20318',name:'서도훈'},
    {no:19,id:'20319',name:'석진오'},{no:20,id:'20320',name:'손우린'},{no:21,id:'20321',name:'오태윤'},
    {no:22,id:'20322',name:'우승엽'},{no:23,id:'20323',name:'유어진'},{no:24,id:'20324',name:'이민혁'},
    {no:25,id:'20325',name:'이성민'},{no:26,id:'20326',name:'이승준'},{no:27,id:'20327',name:'이승훈'},
    {no:28,id:'20328',name:'이재성'},{no:29,id:'20329',name:'이채환'},{no:30,id:'20330',name:'장래겸'},
    {no:31,id:'20331',name:'장우진'},{no:32,id:'20332',name:'전재신'},{no:33,id:'20333',name:'정현우'},
    {no:34,id:'20334',name:'조성윤'},{no:35,id:'20335',name:'조승찬'},{no:36,id:'20336',name:'최승호'}
  ]

  var roster=[]
  for(var i=0;i<studentData.length;i++){
    roster.push({no:studentData[i].no,id:studentData[i].id,name:studentData[i].name,status:'present',reason:'기타',manual:false})
  }

  var dtEl=document.getElementById('dt')
  var viewDateEl=document.getElementById('viewDate')
  var clockDateEl=document.getElementById('clockDate')
  var clockTimeEl=document.getElementById('clockTime')
  var clockSecondsEl=document.getElementById('clockSeconds')
  var gridEl=document.getElementById('grid')
  var timelineEl=document.getElementById('timeline')
  var summaryEl=document.getElementById('summary')
  var searchInput=document.getElementById('searchInput')
  var fitShell=document.getElementById('fitShell')
  var fitStage=document.getElementById('fitStage')
  var page=document.getElementById('page')
  var viewDate=new Date()
  var dated={}

  function tick(){
    var d=new Date()
    dtEl.textContent=d.toLocaleTimeString('ko-KR',{hour12:false})
    clockDateEl.textContent=d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'})
    clockTimeEl.textContent=pad(d.getHours())+':'+pad(d.getMinutes())
    clockSecondsEl.textContent=pad(d.getSeconds())
  }

  function pad(n){
    return n<10?'0'+n:String(n)
  }

  function keyOf(d){
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())
  }

  function fmt(d){
    return d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})
  }

  function fileDate(d){
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())
  }

  function arrayHas(arr,value){
    if(!arr) return false
    return arr.indexOf(value)!==-1
  }

  function reasonValid(reason){
    return arrayHas(REASONS,reason)
  }

  function getSavedItem(saved,no){
    if(!saved || !saved.length) return null
    for(var i=0;i<saved.length;i++){
      if(saved[i] && saved[i].no===no) return saved[i]
    }
    return null
  }

  function baseline(d){
    var dowName=WEEKDAYS[d.getDay()]
    var result=[]
    for(var i=0;i<studentData.length;i++){
      var p=studentData[i]
      var participates=arrayHas(PARTICIPATION_RULES[p.no],dowName)
      if(participates){
        result.push({no:p.no,status:'present',reason:'기타',manual:false})
      }else{
        result.push({no:p.no,status:'absent',reason:'학원',manual:false})
      }
    }
    return result
  }

  function loadStorage(){
    try{
      var raw=localStorage.getItem(KEY)
      dated=raw?JSON.parse(raw):{}
    }catch(e){
      dated={}
    }
  }

  function saveStorage(){
    try{
      localStorage.setItem(KEY,JSON.stringify(dated))
    }catch(e){}
  }

  function loadFor(d){
    var key=keyOf(d)
    var saved=dated[key]
    var base=baseline(d)
    var merged=[]

    for(var i=0;i<base.length;i++){
      var b=base[i]
      var s=Array.isArray(saved)?getSavedItem(saved,b.no):null
      if(s){
        var manual=s.manual===true || s.status!==b.status || s.reason!==b.reason
        if(manual){
          merged.push({no:b.no,status:s.status,reason:s.reason,manual:true})
        }else{
          merged.push(b)
        }
      }else{
        merged.push(b)
      }
    }

    for(var j=0;j<roster.length;j++){
      var p=roster[j]
      var m=getSavedItem(merged,p.no)
      p.status=m.status
      p.reason=reasonValid(m.reason)?m.reason:'기타'
      p.manual=!!m.manual
    }

    if(!Array.isArray(saved)){
      dated[key]=merged
      saveStorage()
    }
  }

  function saveFor(d){
    var key=keyOf(d)
    var arr=[]
    for(var i=0;i<roster.length;i++){
      arr.push({no:roster[i].no,status:roster[i].status,reason:roster[i].reason,manual:roster[i].manual===true})
    }
    dated[key]=arr
    saveStorage()
  }

  function getFilteredRoster(){
    var q=searchInput.value.replace(/^\s+|\s+$/g,'').toLowerCase()
    if(!q) return roster.slice()
    var filtered=[]
    for(var i=0;i<roster.length;i++){
      var p=roster[i]
      if(String(p.no).indexOf(q)!==-1 || String(p.id).toLowerCase().indexOf(q)!==-1 || String(p.name).toLowerCase().indexOf(q)!==-1){
        filtered.push(p)
      }
    }
    return filtered
  }

  function setView(d){
    viewDate=new Date(d.getFullYear(),d.getMonth(),d.getDate())
    viewDateEl.textContent=fmt(viewDate)
    loadFor(viewDate)
    renderList()
    renderTimeline()
    fitToScreen()
  }

  function renderList(){
    gridEl.innerHTML=''
    var filtered=getFilteredRoster()

    if(!filtered.length){
      var empty=document.createElement('div')
      empty.className='empty-grid'
      empty.textContent='검색 결과가 없습니다.'
      gridEl.appendChild(empty)
      return
    }

    for(var i=0;i<filtered.length;i++){
      (function(p){
        var card=document.createElement('div')
        var btn=document.createElement('button')
        var sel=document.createElement('select')
        var rw=document.createElement('div')

        function syncCard(){
          card.className='card '+p.status
          btn.className='status '+p.status
          btn.innerHTML='<span class="pill"></span><span class="label">'+(p.status==='present'?'참여':'불참')+'</span>'
          sel.value=p.reason
        }

        card.innerHTML='<div class="no">'+p.no+'.</div><div class="name">'+p.name+'</div><div class="id">'+p.id+'</div>'

        btn.addEventListener('click',function(){
          p.status=p.status==='present'?'absent':'present'
          if(p.status!=='absent') p.reason='기타'
          p.manual=true
          saveFor(viewDate)
          syncCard()
          renderTimeline()
          fitToScreen()
        })

        sel.className='reason'
        for(var r=0;r<REASONS.length;r++){
          var o=document.createElement('option')
          o.value=REASONS[r]
          o.textContent=REASONS[r]
          sel.appendChild(o)
        }
        sel.addEventListener('change',function(){
          p.reason=sel.value
          p.manual=true
          saveFor(viewDate)
          renderTimeline()
        })

        rw.className='reason-wrap'
        rw.innerHTML='<span class="reason-label">불참 사유</span>'
        rw.appendChild(sel)

        card.appendChild(btn)
        card.appendChild(rw)
        syncCard()
        gridEl.appendChild(card)
      })(filtered[i])
    }
  }

  function renderTimeline(){
    timelineEl.innerHTML=''
    var abs=[]

    for(var i=0;i<roster.length;i++){
      if(roster[i].status==='absent'){
        abs.push({no:roster[i].no,name:roster[i].name,reason:roster[i].reason})
      }
    }
    abs.sort(function(a,b){return a.no-b.no})

    if(!abs.length){
      var e=document.createElement('div')
      e.className='tl-empty'
      e.textContent='이 날짜의 불참자가 없습니다.'
      timelineEl.appendChild(e)
    }else{
      for(var k=0;k<abs.length;k++){
        var item=document.createElement('div')
        item.className='tl-item'
        item.innerHTML='<div class="tl-name">'+abs[k].no+'. '+abs[k].name+'</div><div class="tl-reason">'+abs[k].reason+'</div>'
        timelineEl.appendChild(item)
      }
    }

    var total=roster.length
    var absentCount=abs.length
    var presentCount=total-absentCount
    summaryEl.textContent='총 인원 '+total+'명 | 불참 인원 '+absentCount+'명 | 참여 인원 '+presentCount+'명'
  }

  function csvCell(v){
    var s=String(v==null?'':v)
    return '"'+s.replace(/"/g,'""')+'"'
  }

  function downloadExcelFile(){
    var rows=[
      ['날짜',fmt(viewDate)],
      [],
      ['번호','학번','이름','상태','불참 사유','수동 변경']
    ]
    var filtered=getFilteredRoster()
    for(var i=0;i<filtered.length;i++){
      rows.push([
        filtered[i].no,
        filtered[i].id,
        filtered[i].name,
        filtered[i].status==='present'?'참여':'불참',
        filtered[i].status==='absent'?filtered[i].reason:'',
        filtered[i].manual?'예':'아니오'
      ])
    }
    var lines=[]
    for(var j=0;j<rows.length;j++){
      var cols=[]
      for(var k=0;k<rows[j].length;k++){
        cols.push(csvCell(rows[j][k]))
      }
      lines.push(cols.join(','))
    }
    var csv='\uFEFF'+lines.join('\r\n')
    var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'})
    var url=URL.createObjectURL(blob)
    var a=document.createElement('a')
    a.href=url
    a.download='2-3_야자명단_'+fileDate(viewDate)+'.csv'
    document.body.appendChild(a)
    a.click()
    a.parentNode.removeChild(a)
    URL.revokeObjectURL(url)
  }

  function fitToScreen(){
    var shellW=fitShell.clientWidth
    var shellH=fitShell.clientHeight
    fitStage.style.transform='scale(1)'
    fitStage.style.width=page.offsetWidth+'px'
    var needW=page.offsetWidth
    var needH=page.offsetHeight
    var scale=Math.min(shellW/needW,shellH/needH)
    if(!isFinite(scale) || scale<=0) scale=1
    if(scale>1) scale=1
    fitStage.style.transform='scale('+scale+')'
    fitStage.style.width=needW+'px'
    fitShell.style.minHeight='0'
  }

  document.getElementById('allPresent').addEventListener('click',function(){
    for(var i=0;i<roster.length;i++){
      roster[i].status='present'
      roster[i].reason='기타'
      roster[i].manual=true
    }
    saveFor(viewDate)
    renderList()
    renderTimeline()
    fitToScreen()
  })

  document.getElementById('allAbsent').addEventListener('click',function(){
    for(var i=0;i<roster.length;i++){
      roster[i].status='absent'
      if(roster[i].reason!=='학원') roster[i].reason='기타'
      roster[i].manual=true
    }
    saveFor(viewDate)
    renderList()
    renderTimeline()
    fitToScreen()
  })

  document.getElementById('goToday').addEventListener('click',function(){
    setView(new Date())
  })

  document.getElementById('downloadExcel').addEventListener('click',downloadExcelFile)

  searchInput.addEventListener('input',function(){
    renderList()
    fitToScreen()
  })

  document.getElementById('clearSearch').addEventListener('click',function(){
    searchInput.value=''
    renderList()
    fitToScreen()
    searchInput.focus()
  })

  ;(function(){
    var last=new Date().toDateString()
    setInterval(function(){
      var now=new Date()
      var s=now.toDateString()
      if(s!==last){
        last=s
        setView(now)
      }
    },60000)
  })()

  document.addEventListener('visibilitychange',function(){
    if(!document.hidden){
      setView(new Date())
    }
  })

  window.addEventListener('resize',fitToScreen)

  tick()
  setInterval(tick,1000)
  loadStorage()
  setView(new Date())
</script>
</body>
</html>
